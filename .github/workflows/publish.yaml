name: amber-publish

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image-matrix:
    name: Image Matrix
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@v5
      - name: Build image matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          matrix=$(jq -c '{
            include: [
              .images[] as $img |
              ($img.arches // ["amd64", "arm64"])[] as $arch |
              {
                image: $img.name,
                context: $img.context,
                file: $img.dockerfile,
                arch: $arch,
                runner: (if $arch == "arm64" then "ubuntu-24.04-arm" else "ubuntu-latest" end)
              }
            ]
          }' docker/images.json)
          echo "build_matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-push:
    name: Build and Push (${{ matrix.image }} ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: image-matrix
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.image-matrix.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@v5
      - name: Read image registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          image_registry="$(jq -r '.registry' docker/images.json)"
          if [ -z "$image_registry" ] || [ "$image_registry" = "null" ]; then
            echo "docker/images.json registry is missing" >&2
            exit 1
          fi
          image_registry="${image_registry%/}"
          echo "image_registry=${image_registry}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REGISTRY=${image_registry}" >> "$GITHUB_ENV"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          build-args: |
            BUILD_MODE=release
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ${{ steps.registry.outputs.image_registry }}/${{ matrix.image }}:main-${{ matrix.arch }}
            ${{ steps.registry.outputs.image_registry }}/${{ matrix.image }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=refs/heads/main-${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=refs/heads/main-${{ matrix.image }}-${{ matrix.arch }}

  merge-manifests:
    name: Create Multi-Arch Manifests
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Read image registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          image_registry="$(jq -r '.registry' docker/images.json)"
          if [ -z "$image_registry" ] || [ "$image_registry" = "null" ]; then
            echo "docker/images.json registry is missing" >&2
            exit 1
          fi
          image_registry="${image_registry%/}"
          echo "image_registry=${image_registry}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REGISTRY=${image_registry}" >> "$GITHUB_ENV"
      - name: List images
        id: images
        shell: bash
        run: |
          set -euo pipefail
          images=$(jq -r --arg reg "$IMAGE_REGISTRY" '.images[].name | "\($reg)/\(.)"' docker/images.json)
          {
            echo "images<<EOF"
            echo "$images"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish base multi-arch tags (main + sha)
        shell: bash
        run: |
          set -euo pipefail
          images="${{ steps.images.outputs.images }}"
          while IFS= read -r image; do
            [ -z "$image" ] && continue
            docker buildx imagetools create \
              -t "${image}:main" \
              "${image}:main-amd64" \
              "${image}:main-arm64"
            docker buildx imagetools create \
              -t "${image}:${GITHUB_SHA}" \
              "${image}:${GITHUB_SHA}-amd64" \
              "${image}:${GITHUB_SHA}-arm64"
          done <<< "$images"
      - name: Compute semver tag metadata
        id: version_tags
        shell: bash
        run: |
          set -euo pipefail
          json="$(cargo run -q -p amber-images --bin version_tags -- --resolve --registry "$IMAGE_REGISTRY" --sha "$GITHUB_SHA" docker/images.json)"
          {
            echo "json<<EOF"
            echo "$json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Read amber-cli release version
        id: cli_version
        shell: bash
        run: |
          set -euo pipefail
          version="$(jq -re '.images[] | select(.name == "amber-cli") | .version' <<< '${{ steps.version_tags.outputs.json }}')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Rebuild amber-cli with resolved version metadata
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/amber-cli/Dockerfile
          build-args: |
            BUILD_MODE=release
            AMBER_BUILD_VERSION=${{ steps.cli_version.outputs.version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.registry.outputs.image_registry }}/amber-cli:main
            ${{ steps.registry.outputs.image_registry }}/amber-cli:${{ github.sha }}
      - name: Publish release versions and semver channels
        shell: bash
        run: |
          set -euo pipefail
          manifest_signature() {
            local ref="$1"
            docker buildx imagetools inspect --raw "$ref" | jq -cS '
              if has("manifests") then
                .manifests |= sort_by(
                  .platform.os // "",
                  .platform.architecture // "",
                  .platform.variant // "",
                  .digest
                )
              else
                .
              end
            '
          }

          version_tags_json='${{ steps.version_tags.outputs.json }}'
          while IFS= read -r entry; do
            [ -z "$entry" ] && continue
            name="$(jq -r '.name' <<< "$entry")"
            version="$(jq -r '.version' <<< "$entry")"
            release_ref="${IMAGE_REGISTRY}/${name}:${version}"
            sha_ref="${IMAGE_REGISTRY}/${name}:${GITHUB_SHA}"

            if docker buildx imagetools inspect "$release_ref" >/dev/null 2>&1; then
              release_sig="$(manifest_signature "$release_ref")"
              sha_sig="$(manifest_signature "$sha_ref")"
              if [ "$release_sig" != "$sha_sig" ]; then
                echo "::error::Release tag ${release_ref} already exists but does not match ${sha_ref}. Update docker/images.json version template for ${name} to a higher range."
                exit 1
              fi
              echo "release tag already exists and matches current sha: $release_ref"
            else
              docker buildx imagetools create \
                -t "$release_ref" \
                "$sha_ref"
            fi

            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              docker buildx imagetools create \
                -t "${IMAGE_REGISTRY}/${name}:${tag}" \
                "$release_ref"
            done < <(jq -r '.floating_tags[]' <<< "$entry")
          done < <(jq -c '.images[]' <<< "$version_tags_json")

  verify-image-tags:
    name: Verify Internal Image Tags
    runs-on: ubuntu-latest
    needs: merge-manifests
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Read image registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          image_registry="$(jq -r '.registry' docker/images.json)"
          if [ -z "$image_registry" ] || [ "$image_registry" = "null" ]; then
            echo "docker/images.json registry is missing" >&2
            exit 1
          fi
          image_registry="${image_registry%/}"
          echo "IMAGE_REGISTRY=${image_registry}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute semver tag metadata
        id: version_tags
        shell: bash
        run: |
          set -euo pipefail
          json="$(cargo run -q -p amber-images --bin version_tags -- --resolve --registry "$IMAGE_REGISTRY" --sha "$GITHUB_SHA" docker/images.json)"
          {
            echo "json<<EOF"
            echo "$json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Verify tags exist
        shell: bash
        run: |
          set -euo pipefail
          version_tags_json='${{ steps.version_tags.outputs.json }}'
          expected_file="$(mktemp)"

          while IFS= read -r entry; do
            [ -z "$entry" ] && continue
            name="$(jq -r '.name' <<< "$entry")"
            version="$(jq -r '.version // ""' <<< "$entry")"
            [ -z "$version" ] && continue

            echo "${name}:${version}" >> "$expected_file"
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              echo "${name}:${tag}" >> "$expected_file"
            done < <(jq -r '.floating_tags[]' <<< "$entry")
          done < <(jq -c '.images[]' <<< "$version_tags_json")

          missing=0
          while IFS= read -r spec; do
            [ -z "$spec" ] && continue
            image="${IMAGE_REGISTRY}/${spec}"
            if ! docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
              echo "::error::Missing image tag ${image}"
              missing=1
            fi
          done < <(sort -u "$expected_file")

          rm -f "$expected_file"
          exit "$missing"

  docker-tests:
    name: Docker Smoke Tests (prebuilt images)
    runs-on: ubuntu-latest
    needs: merge-manifests
    permissions:
      contents: read
      packages: read
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      AMBER_TEST_USE_PREBUILT_IMAGES: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Read image registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          image_registry="$(jq -r '.registry' docker/images.json)"
          if [ -z "$image_registry" ] || [ "$image_registry" = "null" ]; then
            echo "docker/images.json registry is missing" >&2
            exit 1
          fi
          image_registry="${image_registry%/}"
          echo "IMAGE_REGISTRY=${image_registry}" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute semver tag metadata
        id: version_tags
        shell: bash
        run: |
          set -euo pipefail
          json="$(cargo run -q -p amber-images --bin version_tags -- --resolve --registry "$IMAGE_REGISTRY" --sha "$GITHUB_SHA" docker/images.json)"
          {
            echo "json<<EOF"
            echo "$json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Pull and retag images for tests
        shell: bash
        run: |
          set -euo pipefail
          version_tags_json='${{ steps.version_tags.outputs.json }}'
          while IFS= read -r spec; do
            [ -z "$spec" ] && continue
            name="$(jq -r '.name' <<< "$spec")"
            version="$(jq -r '.version' <<< "$spec")"
            runtime_tag="$(jq -r '.runtime_tag' <<< "$spec")"
            src="${IMAGE_REGISTRY}/${name}:${GITHUB_SHA}"
            docker pull "$src"
            docker tag "$src" "${IMAGE_REGISTRY}/${name}:${version}"
            if [ "$runtime_tag" != "$version" ]; then
              docker tag "$src" "${IMAGE_REGISTRY}/${name}:${runtime_tag}"
            fi
            if [ "$name" = "amber-helper" ]; then
              docker tag "$src" "amber-helper:e2e"
            fi
          done < <(jq -c '.images[]' <<< "$version_tags_json")
      - name: Run docker compose smoke tests
        run: |
          cargo test -p amber-compiler --all-features docker_smoke_ocap_blocks_unbound_callers -- --ignored --test-threads=1
          cargo test -p amber-compiler --all-features docker_smoke_config_forwarding_runtime_validation -- --ignored --test-threads=1
          cargo test -p amber-compiler --all-features docker_smoke_external_slot_routes_to_outside_service -- --ignored --test-threads=1
      - name: Run helper docker smoke test
        run: cargo test -p amber-helper --all-features helper_image_executes_run_plan_in_scratch -- --ignored --test-threads=1

  cli-artifacts:
    name: Build amber-cli artifacts (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: merge-manifests
    permissions:
      contents: read
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - platform: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-10-30
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Read image registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          image_registry="$(jq -r '.registry' docker/images.json)"
          if [ -z "$image_registry" ] || [ "$image_registry" = "null" ]; then
            echo "docker/images.json registry is missing" >&2
            exit 1
          fi
          image_registry="${image_registry%/}"
          echo "IMAGE_REGISTRY=${image_registry}" >> "$GITHUB_ENV"
      - name: Resolve amber-cli release version
        id: cli_version
        shell: bash
        run: |
          set -euo pipefail
          json="$(cargo run -q -p amber-images --bin version_tags -- --resolve --registry "$IMAGE_REGISTRY" --sha "$GITHUB_SHA" docker/images.json)"
          version="$(jq -re '.images[] | select(.name == "amber-cli") | .version' <<< "$json")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Install musl toolchain
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build amber-cli
        env:
          AMBER_BUILD_VERSION: ${{ steps.cli_version.outputs.version }}
        run: cargo build -p amber-cli --release --target ${{ matrix.target }}
      - name: Package artifact
        run: |
          set -euo pipefail
          tar -czf "amber-cli-${{ matrix.platform }}.tar.gz" -C "target/${{ matrix.target }}/release" amber
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amber-cli-${{ matrix.platform }}
          path: amber-cli-${{ matrix.platform }}.tar.gz
          if-no-files-found: error
