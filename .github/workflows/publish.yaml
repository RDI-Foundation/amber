name: amber-publish

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolved-version-tags:
    name: Resolve Image Versions
    runs-on: ubuntu-latest
    outputs:
      json: ${{ steps.version_tags.outputs.json }}
      amber_cli_version: ${{ steps.cli_version.outputs.version }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Read image registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          image_registry="$(jq -r '.registry' docker/images.json)"
          if [ -z "$image_registry" ] || [ "$image_registry" = "null" ]; then
            echo "docker/images.json registry is missing" >&2
            exit 1
          fi
          image_registry="${image_registry%/}"
          echo "image_registry=${image_registry}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REGISTRY=${image_registry}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute semver tag metadata
        id: version_tags
        shell: bash
        run: |
          set -euo pipefail
          json="$(cargo run -q -p amber-images --bin version_tags -- --resolve --registry "$IMAGE_REGISTRY" --sha "$GITHUB_SHA" docker/images.json)"
          {
            echo "json<<EOF"
            echo "$json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Read amber-cli release version
        id: cli_version
        shell: bash
        run: |
          set -euo pipefail
          version="$(jq -re '.images[] | select(.name == "amber-cli") | .version' <<< '${{ steps.version_tags.outputs.json }}')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  image-matrix:
    name: Image Matrix
    runs-on: ubuntu-latest
    needs: resolved-version-tags
    outputs:
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@v5
      - name: Build image matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          version_tags_json='${{ needs.resolved-version-tags.outputs.json }}'
          matrix=$(jq -cn --slurpfile manifest docker/images.json --argjson versions "$version_tags_json" '
            ($manifest[0]) as $manifest |
            {
            include: [
              $manifest.images[] as $img |
              ($img.arches // ["amd64", "arm64"])[] as $arch |
              {
                image: $img.name,
                context: $img.context,
                file: $img.dockerfile,
                arch: $arch,
                runner: (if $arch == "arm64" then "ubuntu-24.04-arm" else "ubuntu-latest" end),
                resolved_version: (
                  $versions.images[]
                  | select(.name == $img.name)
                  | .version
                )
              }
            ]
          }')
          echo "build_matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-push:
    name: Build and Push (${{ matrix.image }} ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: image-matrix
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.image-matrix.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@v5
      - name: Read image registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          image_registry="$(jq -r '.registry' docker/images.json)"
          if [ -z "$image_registry" ] || [ "$image_registry" = "null" ]; then
            echo "docker/images.json registry is missing" >&2
            exit 1
          fi
          image_registry="${image_registry%/}"
          echo "image_registry=${image_registry}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REGISTRY=${image_registry}" >> "$GITHUB_ENV"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          build-args: |
            BUILD_MODE=release
            AMBER_BUILD_VERSION=${{ matrix.resolved_version }}
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ${{ steps.registry.outputs.image_registry }}/${{ matrix.image }}:main-${{ matrix.arch }}
            ${{ steps.registry.outputs.image_registry }}/${{ matrix.image }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=refs/heads/main-${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=refs/heads/main-${{ matrix.image }}-${{ matrix.arch }}

  merge-manifests:
    name: Create Multi-Arch Manifests
    runs-on: ubuntu-latest
    needs: [build-push, resolved-version-tags]
    outputs:
      amber_cli_version: ${{ steps.cli_version.outputs.version }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Read image registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          image_registry="$(jq -r '.registry' docker/images.json)"
          if [ -z "$image_registry" ] || [ "$image_registry" = "null" ]; then
            echo "docker/images.json registry is missing" >&2
            exit 1
          fi
          image_registry="${image_registry%/}"
          echo "image_registry=${image_registry}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REGISTRY=${image_registry}" >> "$GITHUB_ENV"
      - name: List images
        id: images
        shell: bash
        run: |
          set -euo pipefail
          images=$(jq -r --arg reg "$IMAGE_REGISTRY" '.images[].name | "\($reg)/\(.)"' docker/images.json)
          {
            echo "images<<EOF"
            echo "$images"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Export amber-cli release version
        id: cli_version
        shell: bash
        run: |
          set -euo pipefail
          echo "version=${{ needs.resolved-version-tags.outputs.amber_cli_version }}" >> "$GITHUB_OUTPUT"
      - name: Publish base multi-arch tags (main + sha)
        shell: bash
        run: |
          set -euo pipefail
          images="${{ steps.images.outputs.images }}"
          while IFS= read -r image; do
            [ -z "$image" ] && continue
            docker buildx imagetools create \
              --annotation "index:org.opencontainers.image.revision=${GITHUB_SHA}" \
              -t "${image}:main" \
              "${image}:main-amd64" \
              "${image}:main-arm64"
            docker buildx imagetools create \
              --annotation "index:org.opencontainers.image.revision=${GITHUB_SHA}" \
              -t "${image}:${GITHUB_SHA}" \
              "${image}:${GITHUB_SHA}-amd64" \
              "${image}:${GITHUB_SHA}-arm64"
          done <<< "$images"
      - name: Publish release versions and semver channels
        shell: bash
        run: |
          set -euo pipefail
          manifest_signature() {
            local ref="$1"
            docker buildx imagetools inspect --raw "$ref" | jq -cS '
              if has("manifests") then
                .manifests |= sort_by(
                  .platform.os // "",
                  .platform.architecture // "",
                  .platform.variant // "",
                  .digest
                )
              else
                .
              end
            '
          }
          manifest_revision() {
            local ref="$1"
            docker buildx imagetools inspect --raw "$ref" | jq -r '.annotations["org.opencontainers.image.revision"] // ""'
          }

          version_tags_json='${{ needs.resolved-version-tags.outputs.json }}'
          while IFS= read -r entry; do
            [ -z "$entry" ] && continue
            name="$(jq -r '.name' <<< "$entry")"
            version="$(jq -r '.version' <<< "$entry")"
            release_ref="${IMAGE_REGISTRY}/${name}:${version}"
            sha_ref="${IMAGE_REGISTRY}/${name}:${GITHUB_SHA}"

            if docker buildx imagetools inspect "$release_ref" >/dev/null 2>&1; then
              release_revision="$(manifest_revision "$release_ref")"
              if [ "$release_revision" = "$GITHUB_SHA" ]; then
                echo "release tag already exists and points at current revision: $release_ref"
              else
                release_sig="$(manifest_signature "$release_ref")"
                sha_sig="$(manifest_signature "$sha_ref")"
                if [ "$release_sig" != "$sha_sig" ]; then
                  echo "::error::Release tag ${release_ref} already exists but does not match ${sha_ref}. Update docker/images.json version template for ${name} to a higher range."
                  exit 1
                fi
                echo "release tag already exists and matches current sha: $release_ref"
              fi
            else
              docker buildx imagetools create \
                --annotation "index:org.opencontainers.image.revision=${GITHUB_SHA}" \
                -t "$release_ref" \
                "$sha_ref"
            fi

            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              docker buildx imagetools create \
                --annotation "index:org.opencontainers.image.revision=${GITHUB_SHA}" \
                -t "${IMAGE_REGISTRY}/${name}:${tag}" \
                "$release_ref"
            done < <(jq -r '.floating_tags[]' <<< "$entry")
          done < <(jq -c '.images[]' <<< "$version_tags_json")

  verify-image-tags:
    name: Verify Internal Image Tags
    runs-on: ubuntu-latest
    needs: [merge-manifests, resolved-version-tags]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
      - name: Read image registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          image_registry="$(jq -r '.registry' docker/images.json)"
          if [ -z "$image_registry" ] || [ "$image_registry" = "null" ]; then
            echo "docker/images.json registry is missing" >&2
            exit 1
          fi
          image_registry="${image_registry%/}"
          echo "IMAGE_REGISTRY=${image_registry}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify tags exist
        shell: bash
        run: |
          set -euo pipefail
          version_tags_json='${{ needs.resolved-version-tags.outputs.json }}'
          expected_file="$(mktemp)"

          while IFS= read -r entry; do
            [ -z "$entry" ] && continue
            name="$(jq -r '.name' <<< "$entry")"
            version="$(jq -r '.version // ""' <<< "$entry")"
            [ -z "$version" ] && continue

            echo "${name}:${version}" >> "$expected_file"
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              echo "${name}:${tag}" >> "$expected_file"
            done < <(jq -r '.floating_tags[]' <<< "$entry")
          done < <(jq -c '.images[]' <<< "$version_tags_json")

          missing=0
          while IFS= read -r spec; do
            [ -z "$spec" ] && continue
            image="${IMAGE_REGISTRY}/${spec}"
            if ! docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
              echo "::error::Missing image tag ${image}"
              missing=1
            fi
          done < <(sort -u "$expected_file")

          rm -f "$expected_file"
          exit "$missing"

  kubernetes-tests:
    name: Kubernetes Reporter Tests (prebuilt images)
    runs-on: ubuntu-latest
    needs: [merge-manifests, resolved-version-tags]
    permissions:
      contents: read
      packages: read
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Ensure KinD is available
        run: |
          if ! command -v kind >/dev/null 2>&1; then
            curl -fsSL -o /tmp/kind https://kind.sigs.k8s.io/dl/v0.22.0/kind-linux-amd64
            chmod +x /tmp/kind
            sudo mv /tmp/kind /usr/local/bin/kind
          fi
      - name: Ensure kubectl is available
        run: |
          if ! command -v kubectl >/dev/null 2>&1; then
            curl -fsSL -o /tmp/kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x /tmp/kubectl
            sudo mv /tmp/kubectl /usr/local/bin/kubectl
          fi
      - name: Create shared KinD cluster
        shell: bash
        run: |
          set -euo pipefail
          cluster_name="amber-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          kubeconfig="${RUNNER_TEMP}/amber-kind-kubeconfig"
          kind create cluster --name "$cluster_name" --kubeconfig "$kubeconfig" --wait 120s
          echo "AMBER_TEST_KIND_CLUSTER_NAME=${cluster_name}" >> "$GITHUB_ENV"
          echo "AMBER_TEST_KIND_KUBECONFIG=${kubeconfig}" >> "$GITHUB_ENV"
      - name: Read image registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          image_registry="$(jq -r '.registry' docker/images.json)"
          if [ -z "$image_registry" ] || [ "$image_registry" = "null" ]; then
            echo "docker/images.json registry is missing" >&2
            exit 1
          fi
          image_registry="${image_registry%/}"
          echo "IMAGE_REGISTRY=${image_registry}" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and retag images for tests
        shell: bash
        env:
          VERSION_TAGS_JSON: ${{ needs.resolved-version-tags.outputs.json }}
        run: |
          SOURCE_IMAGE_REGISTRY="$IMAGE_REGISTRY" \
          TARGET_IMAGE_REGISTRY="$IMAGE_REGISTRY" \
          SOURCE_IMAGE_TAG="$GITHUB_SHA" \
          ./.github/scripts/prepare_prebuilt_images.sh
      - name: Run Kubernetes smoke tests (prebuilt images)
        env:
          AMBER_TEST_USE_PREBUILT_IMAGES: "1"
        run: |
          cargo test -p amber-compiler --all-features kubernetes_smoke_config_roundtrip -- --ignored --test-threads=1
          cargo test -p amber-compiler --all-features kubernetes_smoke_external_slot_routes_to_outside_service -- --ignored --test-threads=1
          cargo test -p amber-compiler --all-features kubernetes_smoke_export_routes_to_host -- --ignored --test-threads=1
      - name: Delete shared KinD cluster
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${AMBER_TEST_KIND_CLUSTER_NAME:-}" ]; then
            kind delete cluster --name "${AMBER_TEST_KIND_CLUSTER_NAME}" --kubeconfig "${AMBER_TEST_KIND_KUBECONFIG}"
          fi

  docker-tests:
    name: Docker Smoke Tests (prebuilt images)
    runs-on: ubuntu-latest
    needs: [merge-manifests, resolved-version-tags]
    permissions:
      contents: read
      packages: read
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      AMBER_TEST_USE_PREBUILT_IMAGES: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Read image registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          image_registry="$(jq -r '.registry' docker/images.json)"
          if [ -z "$image_registry" ] || [ "$image_registry" = "null" ]; then
            echo "docker/images.json registry is missing" >&2
            exit 1
          fi
          image_registry="${image_registry%/}"
          echo "IMAGE_REGISTRY=${image_registry}" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and retag images for tests
        shell: bash
        env:
          VERSION_TAGS_JSON: ${{ needs.resolved-version-tags.outputs.json }}
        run: |
          SOURCE_IMAGE_REGISTRY="$IMAGE_REGISTRY" \
          TARGET_IMAGE_REGISTRY="$IMAGE_REGISTRY" \
          SOURCE_IMAGE_TAG="$GITHUB_SHA" \
          ./.github/scripts/prepare_prebuilt_images.sh
      - name: Run docker compose smoke tests
        run: |
          cargo test -p amber-compiler --all-features docker_smoke_ocap_blocks_unbound_callers -- --ignored --test-threads=1
          cargo test -p amber-compiler --all-features docker_smoke_config_forwarding_runtime_validation -- --ignored --test-threads=1
          cargo test -p amber-compiler --all-features docker_smoke_external_slot_routes_to_outside_service -- --ignored --test-threads=1
      - name: Run helper docker smoke test
        run: cargo test -p amber-helper --all-features helper_image_executes_run_plan_in_scratch -- --ignored --test-threads=1

  npm-publish-config:
    name: Resolve npm publish config
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check whether npm publishing is configured
        id: check
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  npm-binary-matrix:
    name: npm Binary Matrix
    runs-on: ubuntu-latest
    needs: npm-publish-config
    outputs:
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@v5
        if: needs.npm-publish-config.outputs.enabled == 'true'
      - uses: actions/setup-node@v4
        if: needs.npm-publish-config.outputs.enabled == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: npm/package-lock.json
      - name: Install npm release tooling
        if: needs.npm-publish-config.outputs.enabled == 'true'
        working-directory: npm
        run: npm ci
      - name: Build npm binary matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ needs.npm-publish-config.outputs.enabled }}" != "true" ]; then
            echo 'build_matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p .tmp
          node npm/release.mjs spec > .tmp/npm-release-spec.json
          matrix="$(node npm/release.mjs matrix --spec .tmp/npm-release-spec.json)"
          echo "build_matrix=${matrix}" >> "$GITHUB_OUTPUT"

  npm-binary-artifacts:
    name: Build npm binary artifacts (${{ matrix.package_dir }} ${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    if: ${{ needs.npm-publish-config.outputs.enabled == 'true' }}
    needs: [npm-publish-config, merge-manifests, npm-binary-matrix]
    permissions:
      contents: read
      packages: read
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.npm-binary-matrix.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: npm/package-lock.json
      - name: Install npm release tooling
        working-directory: npm
        run: npm ci
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.source == 'cargo'
        with:
          toolchain: nightly-2025-10-30
      - uses: mozilla-actions/sccache-action@v0.0.9
        if: matrix.source == 'cargo'
      - name: Add Rust target
        if: matrix.source == 'cargo'
        run: rustup target add ${{ matrix.target }}
      - uses: docker/login-action@v3
        if: matrix.source == 'docker'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build npm binary artifact
        env:
          AMBER_BUILD_VERSION: ${{ needs.merge-manifests.outputs.amber_cli_version }}
        run: |
          node npm/release.mjs artifact \
            --package-dir "${{ matrix.package_dir }}" \
            --platform "${{ matrix.platform }}" \
            --source "${{ matrix.source }}" \
            --binary-name "${{ matrix.binary_name }}" \
            --docker-image "${{ matrix.docker_image }}" \
            --binary-path "${{ matrix.binary_path }}" \
            --cargo-package "${{ matrix.cargo_package }}" \
            --target "${{ matrix.target }}" \
            --sha "${{ github.sha }}" \
            --out-dir npm-binaries
      - name: Upload npm binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-binary-${{ matrix.package_dir }}-${{ matrix.platform }}
          path: npm-binaries
          if-no-files-found: error

  npm-packages:
    name: Publish npm packages
    runs-on: ubuntu-latest
    if: ${{ needs.npm-publish-config.outputs.enabled == 'true' }}
    needs: [npm-publish-config, npm-binary-artifacts, verify-image-tags, kubernetes-tests, docker-tests]
    permissions:
      contents: read
      packages: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: npm/package-lock.json
      - name: Install npm release tooling
        working-directory: npm
        run: npm ci
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-10-30
      - name: Download npm binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-binary-*
          path: .tmp/npm-binary-artifacts
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish npm release
        run: |
          mkdir -p .tmp
          node npm/release.mjs spec > .tmp/npm-release-spec.json
          node npm/release.mjs publish-release \
            --spec .tmp/npm-release-spec.json \
            --artifact-root .tmp/npm-binary-artifacts \
            --out-dir .tmp/npm-packages \
            --sha "${{ github.sha }}"

  cli-artifacts:
    name: Build amber-cli artifacts (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: resolved-version-tags
    permissions:
      contents: read
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - platform: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-10-30
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install musl toolchain
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build amber-cli
        env:
          AMBER_BUILD_VERSION: ${{ needs.resolved-version-tags.outputs.amber_cli_version }}
        run: cargo build -p amber-cli --release --target ${{ matrix.target }}
      - name: Package artifact
        run: |
          set -euo pipefail
          tar -czf "amber-cli-${{ matrix.platform }}.tar.gz" -C "target/${{ matrix.target }}/release" amber
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amber-cli-${{ matrix.platform }}
          path: amber-cli-${{ matrix.platform }}.tar.gz
          if-no-files-found: error
